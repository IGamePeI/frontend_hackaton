<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./static/styles/cart.css">
    <title>Корзина</title>
</head>
<body>
    <header>
        <img src="./static/images/LogoSite.png" alt="Лого">
        <div class="header_links">
            <a href="./index.html">Меню</a>
            <a href="./cart.html">Корзина</a>
        </div>
    </header>

    <div class="menu">
        <span>Корзина</span>
        <div id="cart_container" class="dishes">
            <!-- сюда попадают блюда из localStorage -->
        </div>

        <div class="order_form">
            <span>Оформить заказ</span>

            <div>
                <label for="address">Адрес доставки</label>
                <input type="text" id="address" placeholder="Укажите адрес">
            </div>

            <div>
                <label for="user_id">ID пользователя</label>
                <input type="number" id="user_id" placeholder="0" value="0">
            </div>

            <button id="place_order" disabled="true">Оформить заказ</button>
            <span id="order_status"></span>
        </div>
    </div>

    <script src="./static/scripts/cart.js"></script>
</body>
</html>
