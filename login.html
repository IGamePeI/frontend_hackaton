<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./static/styles/login_style.css">
    <title>Машина Времени</title>
</head>
<body>
    <form id="auth_form" class="auth_form">
        <h1>Вход</h1>
        <p>Почта:</p>
        <input type="email" class="email_input" id="email_input" placeholder="Почта">
        <p>Пароль:</p>
        <input type="password" class="password_input" id="password_input" placeholder="Пароль">
        <p><button type="submit" class="login_button" id="login_button">Войти</button></p>
    </form>
</body>
</html>
